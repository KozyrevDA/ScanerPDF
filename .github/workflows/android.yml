name: Android CI

on:
  push:
    branches: [ main ]
  pull_request:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: 'platforms;android-35 build-tools;35.0.0 platform-tools'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Clean
        shell: bash
        run: ./gradlew clean 2>&1 | tee step-clean.log

      - name: Unit tests
        shell: bash
        run: ./gradlew test 2>&1 | tee step-test.log

      - name: Detekt
        shell: bash
        run: ./gradlew :composeApp:detekt 2>&1 | tee step-detekt.log

      - name: Assemble debug APK
        shell: bash
        run: ./gradlew :composeApp:assembleDebug 2>&1 | tee step-assemble.log

      - name: Publish failure log as commit comment
        if: failure()
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          LOG=$(grep -hE "^e: |error:|FAILED|Caused by|What went wrong|> Task .* FAILED" step-*.log 2>/dev/null | head -c 50000 || true)
          TAIL=$(cat step-*.log 2>/dev/null | tail -c 30000); LOG="$LOG"$'\n'"--- tail ---"$'\n'"$TAIL"
          printf 'CI failure (run %s):\n```\n%s\n```\n' "${{ github.run_id }}" "$LOG" > body.txt
          python3 -c "import json;print(json.dumps({'body': open('body.txt').read()}))" > payload.json
          curl -s -X POST -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${{ github.repository }}/commits/${{ github.sha }}/comments" \
            -d @payload.json > /dev/null

      - name: APK info
        run: |
          APK=composeApp/build/outputs/apk/debug/composeApp-debug.apk
          ls -la "$APK"
          sha256sum "$APK"

      - name: Publish build summary as commit comment
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          APK=composeApp/build/outputs/apk/debug/composeApp-debug.apk
          SUMMARY=$(printf 'CI SUCCESS (run %s)\nAPK: %s\nSHA-256: %s\nSize: %s bytes\n\nSteps:\n%s' \
            "${{ github.run_id }}" "$APK" "$(sha256sum "$APK" | cut -d' ' -f1)" "$(stat -c%s "$APK")" \
            "$(grep -hE 'BUILD SUCCESSFUL|actionable task' step-*.log | head -20)")
          printf '%s' "$SUMMARY" > body.txt
          python3 -c "import json;print(json.dumps({'body': open('body.txt').read()}))" > payload.json
          curl -s -X POST -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${{ github.repository }}/commits/${{ github.sha }}/comments" \
            -d @payload.json > /dev/null

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: composeApp-debug-apk
          path: composeApp/build/outputs/apk/debug/composeApp-debug.apk
          if-no-files-found: error

      - name: Upload test and detekt reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: reports
          path: |
            composeApp/build/reports/
          if-no-files-found: ignore

  instrumented-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      # target: default = AOSP-образ БЕЗ Google Play Services.
      # Запуск через bash -o pipefail: emulator-runner использует /usr/bin/sh,
      # который не поддерживает pipefail; иначе tee скрывает код возврата Gradle.
      - name: Run instrumented tests on GMS-free emulator
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 30
          arch: x86_64
          target: default
          disable-animations: true
          emulator-options: -no-snapshot -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim
          script: |
            bash -o pipefail -c './gradlew :composeApp:connectedDebugAndroidTest --stacktrace 2>&1 | tee step-connected.log'

      - name: Instrumented test summary
        if: always()
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          JOB_STATUS: ${{ job.status }}
        run: |
          set +e
          XML=$(grep -rhoE '<testsuite[^>]*' composeApp/build/outputs/androidTest-results/connected 2>/dev/null | sed -E 's/.*name="([^"]*)".*tests="([0-9]+)"[^>]*failures="([0-9]+)"[^>]*errors="([0-9]+)".*/\1: tests=\2 failures=\3 errors=\4/')
          CASES=$(grep -rhoE '<testcase name="[^"]+" classname="[^"]+"' composeApp/build/outputs/androidTest-results/connected 2>/dev/null | sed -E 's/<testcase name="([^"]+)" classname="[^"]*\.([A-Za-z]+)"/\2.\1/' | sort)
          ERRORS=$(grep -hE "^e: |> Task .* FAILED|FAILURE:|What went wrong" step-connected.log 2>/dev/null | head -40)
          TAIL=$(tail -c 4000 step-connected.log 2>/dev/null)
          {
            echo "## Instrumented tests: $JOB_STATUS"
            echo '```'
            echo "$XML"
            echo "--- cases ---"
            echo "$CASES"
            if [ "$JOB_STATUS" != "success" ]; then
              echo "--- errors ---"; echo "$ERRORS"; echo "--- tail ---"; echo "$TAIL"
            fi
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
          {
            printf 'INSTRUMENTED %s (run %s)\n' "$JOB_STATUS" "${{ github.run_id }}"
            printf '```\n%s\n--- cases ---\n%s\n' "$XML" "$CASES"
            if [ "$JOB_STATUS" != "success" ]; then
              printf -- '--- errors ---\n%s\n--- tail ---\n%s\n' "$ERRORS" "$TAIL"
            fi
            printf '```\n'
          } > body.txt
          python3 -c "import json;print(json.dumps({'body': open('body.txt').read()}))" > payload.json
          curl -s -X POST -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${{ github.repository }}/commits/${{ github.sha }}/comments" \
            -d @payload.json > /dev/null
          exit 0

      - name: Upload instrumented logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: instrumented-test-logs
          path: |
            step-connected.log
            composeApp/build/outputs/androidTest-results/
            composeApp/build/reports/androidTests/
          if-no-files-found: warn

  release-build:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
      KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
      KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
      KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
      AI_BASE_URL: ${{ secrets.AI_BASE_URL }}
      RUSTORE_CONSOLE_APP_ID: ${{ secrets.RUSTORE_CONSOLE_APP_ID }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: 'platforms;android-35 build-tools;35.0.0 platform-tools'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Decode keystore from secrets (if configured)
        shell: bash
        run: |
          if [ -n "$KEYSTORE_BASE64" ]; then
            echo "$KEYSTORE_BASE64" | base64 -d > "$RUNNER_TEMP/release.jks"
            echo "KEYSTORE_FILE=$RUNNER_TEMP/release.jks" >> "$GITHUB_ENV"
            echo "Keystore configured: release will be SIGNED"
          else
            echo "No keystore secrets: release will be UNSIGNED"
          fi

      - name: Assemble release APK and AAB
        shell: bash
        run: ./gradlew :composeApp:assembleRelease :composeApp:bundleRelease 2>&1 | tee step-release.log

      - name: Publish failure log as commit comment
        if: failure()
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          LOG=$(grep -hE "^e: |error:|FAILED|Caused by|What went wrong|Missing class|R8" step-*.log 2>/dev/null | head -c 40000 || true)
          TAIL=$(cat step-*.log 2>/dev/null | tail -c 20000); LOG="$LOG"$'\n'"--- tail ---"$'\n'"$TAIL"
          printf 'RELEASE FAILURE (run %s):\n' "${{ github.run_id }}" > body.txt
          printf '```\n%s\n```\n' "$LOG" >> body.txt
          python3 -c "import json;print(json.dumps({'body': open('body.txt').read()}))" > payload.json
          curl -s -X POST -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${{ github.repository }}/commits/${{ github.sha }}/comments" \
            -d @payload.json > /dev/null

      - name: Publish release artifacts info
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          {
            printf 'RELEASE BUILD OK (run %s):\n```\n' "${{ github.run_id }}"
            for f in composeApp/build/outputs/apk/release/*.apk composeApp/build/outputs/bundle/release/*.aab; do
              [ -f "$f" ] && printf '%s\n  SHA-256: %s\n  Size: %s bytes\n' "$f" "$(sha256sum "$f" | cut -d' ' -f1)" "$(stat -c%s "$f")"
            done
            printf '```\n'
          } > body.txt
          python3 -c "import json;print(json.dumps({'body': open('body.txt').read()}))" > payload.json
          curl -s -X POST -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${{ github.repository }}/commits/${{ github.sha }}/comments" \
            -d @payload.json > /dev/null

      - name: Upload release APK
        uses: actions/upload-artifact@v4
        with:
          name: composeApp-release-apk
          path: composeApp/build/outputs/apk/release/*.apk
          if-no-files-found: error

      - name: Upload release AAB
        uses: actions/upload-artifact@v4
        with:
          name: composeApp-release-aab
          path: composeApp/build/outputs/bundle/release/*.aab
          if-no-files-found: error
